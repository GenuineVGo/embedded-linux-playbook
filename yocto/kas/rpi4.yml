header:
  version: 14
  includes:
    - common.yml

machine: raspberrypi4-64
target: core-image-minimal

repos:
  meta-raspberrypi:
    url: "https://github.com/agherzan/meta-raspberrypi.git"
    refspec: scarthgap

local_conf_header:
  rpi4: |
    BB_NUMBER_THREADS = "24"
    PARALLEL_MAKE = "-j24"

    # RPi4 specific
    ENABLE_UART = "1"

    # Image features (pas des packages) pour le debug et ssh
    EXTRA_IMAGE_FEATURES:append = " debug-tweaks"
    IMAGE_FEATURES:append = " ssh-server-dropbear"

    # Packages à installer 
    IMAGE_INSTALL:append = " ssh-keys avahi-daemon avahi-utils libnss-mdns dbus"

    # Produce uncompressed .wic for direct flash (in addition to .wic.bz2)
    # rootfs-only updates (dd to /dev/mmcblk0p2)
    IMAGE_FSTYPES:append = " wic ext4"

    # Hostname
    hostname:pn-base-files = "rpi4-yocto"
